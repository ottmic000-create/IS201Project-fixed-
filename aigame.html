<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minesweeper Lite</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
    margin: 0;
}

header {
    background-color: #C41E3A;
    color: white;
    padding: 20px;
}

#board {
    display: grid;
    grid-template-columns: repeat(8, 45px);
    grid-gap: 4px;
    justify-content: center;
    margin: 30px auto;
}

.cell {
    width: 45px;
    height: 45px;
    background-color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    border-radius: 4px;
}

.cell.revealed {
    background-color: white;
    cursor: default;
}

.cell.mine {
    background-color: #e74c3c;
    color: white;
}

.cell.flag {
    background-color: #f1c40f;
}

button {
    padding: 10px 18px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background-color: #C41E3A;
    color: white;
    font-size: 16px;
}

#message {
    font-size: 18px;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <a class="nav-link px-lg-3 py-3 py-lg-4" href="index.html">Home</a></li>
    <a class="nav-link px-lg-3 py-3 py-lg-4" href="fromScratch.html">From Scratch Page</a></li>
    <h1>Minesweeper Lite</h1>
    <p>Left click to reveal • Right click to flag</p>
</header>

<button onclick="resetGame()">Reset Game</button>

<div id="board"></div>
<div id="message"></div>

<script>
const size = 8;
const mineCount = 10;

let board = [];
let gameOver = false;

function indexToXY(i) {
    return { x: i % size, y: Math.floor(i / size) };
}

function xyToIndex(x, y) {
    return y * size + x;
}

function createBoard() {
    board = [];
    gameOver = false;
    document.getElementById("message").innerText = "";

    let boardEl = document.getElementById("board");
    boardEl.innerHTML = "";

    for (let i = 0; i < size * size; i++) {
        board.push({
            mine: false,
            revealed: false,
            flagged: false,
            count: 0
        });

        let cell = document.createElement("div");
        cell.classList.add("cell");
        cell.dataset.index = i;

        cell.addEventListener("click", () => revealCell(i));
        cell.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            toggleFlag(i);
        });

        boardEl.appendChild(cell);
    }

    // place mines
    let placed = 0;
    while (placed < mineCount) {
        let r = Math.floor(Math.random() * board.length);
        if (!board[r].mine) {
            board[r].mine = true;
            placed++;
        }
    }

    // calculate numbers
    for (let i = 0; i < board.length; i++) {
        if (board[i].mine) continue;

        let { x, y } = indexToXY(i);
        let count = 0;

        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                let nx = x + dx;
                let ny = y + dy;

                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    let ni = xyToIndex(nx, ny);
                    if (board[ni].mine) count++;
                }
            }
        }

        board[i].count = count;
    }
}

function revealCell(i) {
    if (gameOver || board[i].revealed || board[i].flagged) return;

    let cell = document.getElementsByClassName("cell")[i];
    board[i].revealed = true;
    cell.classList.add("revealed");

    if (board[i].mine) {
        cell.classList.add("mine");
        cell.innerText = "💣";
        endGame(false);
        return;
    }

    if (board[i].count > 0) {
        cell.innerText = board[i].count;
    } else {
        // flood fill
        let { x, y } = indexToXY(i);
        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                let nx = x + dx;
                let ny = y + dy;

                if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                    let ni = xyToIndex(nx, ny);
                    if (!board[ni].revealed) {
                        revealCell(ni);
                    }
                }
            }
        }
    }

    checkWin();
}

function toggleFlag(i) {
    if (gameOver || board[i].revealed) return;

    let cell = document.getElementsByClassName("cell")[i];
    board[i].flagged = !board[i].flagged;

    if (board[i].flagged) {
        cell.classList.add("flag");
        cell.innerText = "🚩";
    } else {
        cell.classList.remove("flag");
        cell.innerText = "";
    }
}

function endGame(won) {
    gameOver = true;
    document.getElementById("message").innerText =
        won ? "You Win!" : "Game Over! You hit a mine.";

    board.forEach((c, i) => {
        let el = document.getElementsByClassName("cell")[i];
        if (c.mine) {
            el.classList.add("mine");
            el.innerText = "💣";
        }
    });
}

function checkWin() {
    let safe = board.filter(c => !c.mine).every(c => c.revealed);
    if (safe) endGame(true);
}

function resetGame() {
    createBoard();
}

createBoard();
</script>

</body>
</html>
